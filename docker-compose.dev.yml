version: '3.8'

services:
  order-db:
    image: mysql:8.0
    container_name: order-db
    restart: always
    environment:
      MYSQL_DATABASE: bookstore_order
      MYSQL_USER: bookstore
      MYSQL_PASSWORD: bookstore
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3309:3306"
    volumes:
      - order_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - bookstore-network

  order-service:
    build: 
      context: .
      target: build
    container_name: order-service
    ports:
      - "8084:8080"
    volumes:
      - .:/build
      - ~/.m2:/root/.m2
    command: ./mvnw spring-boot:run -Dspring-boot.run.profiles=dev
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:mysql://order-db:3306/bookstore_order?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: bookstore
      SPRING_DATASOURCE_PASSWORD: bookstore
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MySQLDialect
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    networks:
      - bookstore-network
    depends_on:
      order-db:
        condition: service_healthy

networks:
  bookstore-network:
    external: true

volumes:
  order_mysql_data:
