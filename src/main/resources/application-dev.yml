server:
  port: 8084

spring:
  datasource:
    url: jdbc:mysql://localhost:3309/bookstore_order?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: bookstore
    password: bookstore
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  cloud:
    openfeign:
      client:
        config:
          default:
            connect-timeout: 5000
            read-timeout: 10000

book-service:
  url: ${BOOK_SERVICE_URL:http://localhost:8082}

logging:
  level:
    org.springframework.web: DEBUG
