version: '3.8'

services:
  order-service:
    image: truongikpk/bookstore-order-service:v1.0.0
    container_name: order-service
    ports:
      - "8084:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    networks:
      - bookstore-network

networks:
  bookstore-network:
    external: true
